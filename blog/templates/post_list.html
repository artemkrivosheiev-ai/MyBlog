<h1>My Blog</h1>

{% for post in posts %}
    <h2><a href="{% url 'post_detail' post.pk %}">{{ post.title }}</a></h2>
    <p>Published: {{ post.published_date }}</p>
    <p>Author: <a href="{% url 'posts_by_author' post.author.pk %}">{{ post.author.name }}</a></p>
    <hr>
{% empty %}
    <p>No posts yet.</p>
{% endfor %}
